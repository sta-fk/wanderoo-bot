  activities_title: "<b>🎯 Активності:</b>"
  free_time: "<i>Вільний час або огляд міста на власний розсуд</i>"
  food_title: "<b>🍽️ Місця для їжі:</b>"
  no_food: "<i>Немає рекомендованих місць</i>"
  stop_separator: "━━━━━━━━━━━━━━━━━━━━"
  absent_title: "Ваш маршрут"

