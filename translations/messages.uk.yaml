  header: "<b>🌍 {title}</b>\n<b>🗓️</b> {startDate} — {endDate}\n<b>💰 Загальний бюджет:</b> <b>{totalBudget} {currency}</b>\n<b>⏰ Тривалість:</b> <b>{totalDuration} днів</b>"
  stop_header: "<b>🔹 Зупинка {index}: {city}, {country}</b>\n📍 <i>{startDate} — {endDate}</i>"
